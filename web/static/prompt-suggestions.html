<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with AI – Prompt Suggestions</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Phone shell ─────────────────────────────────────────────── */
    .phone {
      width: 390px;
      background: #f7f8fc;
      border-radius: 44px;
      box-shadow:
        0 40px 80px rgba(0,0,0,.18),
        0 0 0 1px rgba(0,0,0,.06);
      overflow: hidden;
      padding: 52px 0 28px;
      display: flex;
      flex-direction: column;
      height: 844px;
    }

    /* ── Top bar ─────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px 16px;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      letter-spacing: -.2px;
    }

    .topbar-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(0,0,0,.06);
      border-radius: 10px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background .15s;
    }
    .topbar-btn:hover { background: rgba(0,0,0,.1); }
    .topbar-btn svg { color: #555; }

    /* ── Scrollable content ──────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 20px;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── Greeting ────────────────────────────────────────────────── */
    .greeting {
      margin-bottom: 28px;
    }

    .greeting-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(109, 86, 255, .1);
      color: #6d56ff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: .2px;
    }

    .greeting-badge svg {
      width: 13px;
      height: 13px;
    }

    .greeting-name {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1.15;
      letter-spacing: -.6px;
      margin-bottom: 6px;
    }

    .greeting-sub {
      font-size: 15px;
      color: #8a8fa8;
      font-weight: 450;
    }

    .greeting-sub span {
      color: #6d56ff;
      font-weight: 600;
    }

    /* ── Section header ──────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #b0b5c8;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    /* ── Chip entrance animation ─────────────────────────────────── */
    @keyframes chipIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .chip {
      opacity: 0;
      animation: chipIn .4s cubic-bezier(.34,1.56,.64,1) forwards;
    }

    /* stagger each chip */
    .chips-row .chip:nth-child(1) { animation-delay: .05s; }
    .chips-row .chip:nth-child(2) { animation-delay: .12s; }
    .chips-row .chip:nth-child(3) { animation-delay: .19s; }
    .chips-row .chip:nth-child(4) { animation-delay: .26s; }
    .chips-row .chip:nth-child(5) { animation-delay: .33s; }
    .chips-row .chip:nth-child(6) { animation-delay: .40s; }
    .chips-row .chip:nth-child(7) { animation-delay: .47s; }
    .chips-row .chip:nth-child(8) { animation-delay: .54s; }

    /* ── Chips row ───────────────────────────────────────────────── */
    .chips-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    /* right-edge fade to hint more chips */
    .chips-wrap::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 56px;
      background: linear-gradient(to left, #f7f8fc, transparent);
      pointer-events: none;
    }

    .chips-row {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      padding: 4px 4px 8px;
      scrollbar-width: none;
    }
    .chips-row::-webkit-scrollbar { display: none; }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding: 10px 14px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.9);
      background: rgba(249,252,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 10px 24px rgba(58,81,108,0.05);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #090c14;
      white-space: nowrap;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, background .15s, opacity .15s;
    }

    .chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(58,81,108,0.1);
      background: rgba(255,255,255,0.96);
    }

    .chip:active {
      transform: scale(.96);
    }

    /* Featured chip */
    .chip-featured {
      background: linear-gradient(135deg, rgba(109,86,255,0.08), rgba(196,113,237,0.08));
      border-color: rgba(109,86,255,0.25);
    }

    .chip-featured:hover {
      background: linear-gradient(135deg, rgba(109,86,255,0.13), rgba(196,113,237,0.13));
    }

    .chip-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: linear-gradient(135deg, #6d56ff, #c471ed);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* Refresh chip — icon only */
    .chip-refresh {
      padding: 0;
      width: 40px;
      height: 40px;
      justify-content: center;
      flex-shrink: 0;
    }

    .chip-refresh svg {
      width: 16px;
      height: 16px;
      color: #334983;
    }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #c0c5d8;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e4e6f0;
    }

    /* ── Bottom input area ───────────────────────────────────────── */
    .input-area {
      padding: 12px 20px 8px;
      border-top: 1px solid #ececf3;
      background: #f7f8fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-add {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1.5px solid #e0e2ee;
      background: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      color: #888;
      transition: border-color .15s;
    }
    .input-add:hover { border-color: #6d56ff; color: #6d56ff; }

    .input-wrap {
      flex: 1;
      background: #fff;
      border: 1.5px solid #e0e2ee;
      border-radius: 14px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: #6d56ff; }

    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: #1a1a2e;
    }
    .input-wrap input::placeholder { color: #b8bdd2; }

    .model-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f0eeff;
      color: #6d56ff;
      border-radius: 8px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
    }
    .model-pill svg { width: 10px; height: 10px; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6d56ff, #9e6fff);
      border: none;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(109,86,255,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 16px rgba(109,86,255,.5);
    }
    .send-btn svg { color: #fff; }
  </style>
</head>
<body>

<div class="phone">

  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title">Chat with AI</span>
    <button class="topbar-btn" aria-label="Collapse">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>

  <!-- Scrollable body -->
  <div class="content">

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting-badge">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/>
        </svg>
        Hi, Christina
      </div>
      <h1 class="greeting-name">Make something<br/>awesome today?</h1>
      <p class="greeting-sub">Pick a spark below or <span>type your own idea</span></p>
    </div>

    <!-- Suggestions -->
    <div class="section-header">
      <span class="section-label">Suggestions</span>
    </div>

    <div class="chips-wrap">
      <div class="chips-row" id="chips-row">

        <!-- Refresh button -->
        <button class="chip chip-refresh" aria-label="Shuffle suggestions" onclick="shuffleChips()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>

        <button class="chip chip-featured" onclick="selectPrompt('Create a love story')">💗 Create a love story <span class="chip-badge">🔥 Hot</span></button>
        <button class="chip" onclick="selectPrompt('Create a top 5 animal facts')">🐒 Top 5 animal facts</button>
        <button class="chip" onclick="selectPrompt('Create a news video')">📰 Create a news video</button>
        <button class="chip" onclick="selectPrompt('Make a music montage')">🎵 Make a music montage</button>
        <button class="chip" onclick="selectPrompt('Create a travel vlog intro')">✈️ Travel vlog intro</button>
        <button class="chip" onclick="selectPrompt('Write a motivational speech')">🔥 Motivational speech</button>
        <button class="chip" onclick="selectPrompt('Create a cooking tutorial')">🍳 Cooking tutorial</button>

      </div>
    </div>

    <div class="divider">or write your own</div>

  </div>

  <!-- Input bar -->
  <div class="input-area">
    <button class="input-add" aria-label="Add attachment">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>

    <div class="input-wrap">
      <input id="prompt-input" type="text" placeholder="Enter your ideas…" />
      <button class="model-pill">
        Auto
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

    <button class="send-btn" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

</div>

<script>
  function selectPrompt(text) {
    const input = document.getElementById('prompt-input');
    input.value = text;
    input.focus();
  }

  function shuffleChips() {
    const row = document.getElementById('chips-row');
    const refreshBtn = row.querySelector('.chip-refresh');
    const chips = Array.from(row.querySelectorAll('.chip:not(.chip-refresh)'));

    // Fisher-Yates shuffle
    for (let i = chips.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [chips[i], chips[j]] = [chips[j], chips[i]];
    }

    // Re-insert: refresh button first, then shuffled chips
    row.innerHTML = '';
    row.appendChild(refreshBtn);
    chips.forEach(c => {
      // Reset animation so it replays
      c.style.animation = 'none';
      c.offsetHeight; // force reflow
      c.style.animation = '';
      row.appendChild(c);
    });

    // Scroll back to start
    row.scrollLeft = 0;
  }
</script>

</body>
</html>
