<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Creative Benchmark{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --text:     #e2e8f0;
      --muted:    #8892a4;
      --ai-badge: #6c63ff;
      --nonai-badge: #f59e0b;
      --radius:   8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    .nav-brand span { color: var(--accent2); }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: color .15s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filters select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .filters label { color: var(--muted); font-size: 12px; }

    /* ── Feature cards ── */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color .15s, transform .1s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .product-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent2);
    }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    .badge-ai    { background: rgba(108,99,255,.2); color: #a5a0ff; }
    .badge-nonai { background: rgba(245,158,11,.15); color: #f59e0b; }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
      line-height: 1.4;
    }
    .feature-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 11px;
      color: var(--muted);
    }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
    }
    .card-footer a { color: var(--accent); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* Score badge for search */
    .score-badge {
      font-size: 10px;
      background: rgba(0,212,170,.12);
      color: var(--accent2);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 32px;
    }
    .pagination a, .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      transition: all .15s;
    }
    .pagination a:hover { border-color: var(--accent); color: var(--accent); }
    .pagination span.current {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat { color: var(--muted); font-size: 12px; }
    .stat strong { color: var(--text); font-size: 16px; display: block; }

    /* ── Scrape button ── */
    #scrape-btn { font-size: 12px; padding: 7px 14px; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .empty h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      display: none;
      z-index: 9999;
    }

    @media (max-width: 640px) {
      .feature-grid { grid-template-columns: 1fr; }
      nav { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">Creative<span>Bench</span></a>
    <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Browse</a>
    <a href="/search" {% if request.endpoint == 'search_page' %}class="active"{% endif %}>Semantic Search</a>
    <div class="nav-right">
      <button class="btn btn-outline" id="scrape-btn" onclick="triggerScrape()">▶ Run Scrape</button>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <div id="toast"></div>

  <script>
    function triggerScrape() {
      const btn = document.getElementById('scrape-btn');
      btn.textContent = '⏳ Running…';
      btn.disabled = true;
      fetch('/api/scrape', { method: 'POST' })
        .then(r => r.json())
        .then(() => {
          showToast('Scrape started in background. Refresh in a few minutes.');
          setTimeout(() => { btn.textContent = '▶ Run Scrape'; btn.disabled = false; }, 3000);
        })
        .catch(() => {
          showToast('Error starting scrape.');
          btn.textContent = '▶ Run Scrape';
          btn.disabled = false;
        });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 4000);
    }
  </script>
</body>
</html>
